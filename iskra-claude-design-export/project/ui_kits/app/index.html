<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iskra — App UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #E9E7E2;
    background-image: radial-gradient(circle at 50% 0%, #F3F1EC, #E5E2DC);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; font-family: "Manrope", system-ui, sans-serif;
  }
  #stage { transform-origin: center center; }
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; -ms-overflow-style: none; }
</style>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../../frames/ios-frame.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel">
    function Home() {
      const [tool, setTool] = React.useState(null);
      const goals = [
        { k: 'zdravlje', name: 'Zdravlje', pct: 70, c: GOAL.zdravlje },
        { k: 'pluca', name: 'Pluća', pct: 45, c: GOAL.pluca },
        { k: 'ekologija', name: 'Ekologija', pct: 60, c: GOAL.ekologija },
        { k: 'finansije', name: 'Finansije', pct: 80, c: GOAL.finansije },
        { k: 'telo', name: 'Telo', pct: 50, c: GOAL.telo },
        { k: 'nikotin', name: 'Nikotin', pct: 35, c: GOAL.nikotin },
      ];
      return (
        <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: ISK.bg, fontFamily: '"Manrope", system-ui' }}>
          <div style={{ flex: 1, overflowY: 'auto', padding: '54px 18px 0' }}>
            {/* greeting */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: 13, background: ISK.emberSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, color: ISK.ember, fontSize: 17 }}>P</div>
                <div>
                  <div style={{ fontSize: 13, color: ISK.sub }}>Zdravo,</div>
                  <div style={{ fontSize: 19, fontWeight: 700, color: ISK.text, letterSpacing: '-0.01em' }}>Pavle</div>
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: ISK.emberTint, padding: '7px 12px', borderRadius: 999 }}>
                <Flame size={16} stroke={ISK.ember} sw={2} /><span style={{ fontSize: 14, fontWeight: 700, color: ISK.emberDeep }}>47</span>
              </div>
            </div>

            {/* textured weekly tracker */}
            <div style={{ position: 'relative', overflow: 'hidden', borderRadius: 18, background: ISK.emberGrad, boxShadow: '0 8px 22px rgba(232,98,26,0.22)', padding: '17px 16px 18px', marginTop: 18 }}>
              <div style={{ position: 'absolute', inset: 0, backgroundImage: 'url("../../assets/canyon-bg.png")', backgroundSize: 'cover', backgroundPosition: 'center 45%', opacity: 0.42, mixBlendMode: 'soft-light', filter: 'saturate(0.7)' }} />
              <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
                <span style={{ fontSize: 15.5, fontWeight: 700, color: '#fff', textShadow: '0 1px 8px rgba(120,50,10,0.35)', whiteSpace: 'nowrap' }}>Ova nedelja</span>
                <span style={{ fontSize: 12.5, fontWeight: 700, color: 'rgba(255,255,255,0.92)' }}>5 / 7</span>
              </div>
              <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between' }}>
                {['Pon','Uto','Sre','Čet','Pet','Sub','Ned'].map((d, i) => (
                  <div key={d} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 9 }}>
                    <span style={{ fontSize: 11.5, fontWeight: 700, color: '#fff', textShadow: '0 1px 6px rgba(120,50,10,0.4)' }}>{d}</span>
                    {i < 5 ? (
                      <div style={{ width: 30, height: 30, borderRadius: '50%', background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 6px rgba(120,50,10,0.28)' }}>
                        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5 6 11l5.5-7" stroke={ISK.ember} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" /></svg>
                      </div>
                    ) : i === 5 ? (
                      <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', border: '2px solid #fff', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 17, fontWeight: 700 }}>?</div>
                    ) : (
                      <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'rgba(255,255,255,0.22)', border: '1.5px solid rgba(255,255,255,0.7)' }} />
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* stat cards */}
            <div style={{ display: 'flex', gap: 12, marginTop: 13 }}>
              <StatCard cat="money" value="18.800" label="RSD ušteđeno" sub="Raste svaki dan" icon={(c) => <Coin size={20} stroke={c} sw={2} />} />
              <StatCard cat="cig" value="940" label="cigareta odbijeno" sub="u 47 dana" icon={(c) => <CigOff size={20} stroke={c} sw={1.9} />} />
            </div>

            {/* goals */}
            <div style={{ fontSize: 16, fontWeight: 700, color: ISK.text, marginTop: 22, marginBottom: 13, letterSpacing: '-0.01em' }}>Moj napredak</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 11 }}>
              {goals.map((g) => (
                <div key={g.k} style={{ background: '#fff', border: `1px solid ${ISK.border}`, borderRadius: 14, padding: '15px 11px 13px', boxShadow: ISK.shadowSm, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 9 }}>
                  <Spark size={24} stroke={g.c} sw={1.9} />
                  <span style={{ fontSize: 12, fontWeight: 700, color: g.c, marginBottom: 4 }}>{g.name}</span>
                  <ProgressBar pct={g.pct} color={g.c} />
                </div>
              ))}
            </div>
            <div style={{ height: 18 }} />
          </div>

          {/* fixed CTA */}
          <div style={{ padding: '10px 18px 6px', background: ISK.bg }}>
            <Button icon={<Spark size={18} stroke="#fff" sw={2.1} />}>Imam poriv</Button>
          </div>
          <BottomNav active="home" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice><Home /></IOSDevice>);
    function fit() {
      const W = 402, H = 874, m = 28;
      const s = Math.min((window.innerWidth - m) / W, (window.innerHeight - m) / H, 1);
      document.getElementById('stage').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit); fit();
  </script>
</body>
</html>
