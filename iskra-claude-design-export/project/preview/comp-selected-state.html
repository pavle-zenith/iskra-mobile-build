<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:24px 30px;display:flex;gap:14px}
  .pill{flex:1;border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
  .un{background:#fff;border:1.5px solid var(--border-input)}
  .sel{background:var(--ember-grad);border:1.5px solid var(--ember);box-shadow:0 4px 12px rgba(232,98,26,0.24)}
  .chip{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center}
  .lab{font:600 14px/1 var(--font)}
</style></head>
<body>
  <div class="pill un">
    <span class="chip" style="background:#FEF3E2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13v4a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4Z"/><path d="M17 10h2.2a2.3 2.3 0 0 1 0 4.6H17"/><path d="M7 3.5c0 1-.8 1.3-.8 2.3M11 3.5c0 1-.8 1.3-.8 2.3"/></svg></span>
    <span class="lab" style="color:var(--text)">Jutarnja kafa</span>
  </div>
  <div class="pill sel">
    <span class="chip" style="background:#fff"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E8621A" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13v4a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4Z"/><path d="M17 10h2.2a2.3 2.3 0 0 1 0 4.6H17"/><path d="M7 3.5c0 1-.8 1.3-.8 2.3M11 3.5c0 1-.8 1.3-.8 2.3"/></svg></span>
    <span class="lab" style="color:#fff">Jutarnja kafa</span>
  </div>
</body></html>
