<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:24px 30px;display:flex;flex-direction:column;gap:12px}
  button{width:100%;height:56px;border-radius:16px;font:700 16px/1 var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px}
  .primary{border:none;background:var(--ember-grad);color:#fff;box-shadow:var(--shadow-ember)}
  .secondary{background:#fff;border:1.5px solid var(--border-input);color:var(--text-sub);font-weight:400}
  .disabled{border:none;background:#F0D6C6;color:#fff}
  .text{background:none;border:none;color:var(--text-sub);font-weight:400;height:40px}
</style></head>
<body>
  <button class="primary"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/></svg>Imam poriv</button>
  <button class="secondary">Zapalio/la sam</button>
  <button class="disabled">Nastavi</button>
  <button class="text">Možda kasnije</button>
</body></html>
