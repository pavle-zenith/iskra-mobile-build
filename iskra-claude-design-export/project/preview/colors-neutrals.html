<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border-radius:14px;height:78px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--border)}
  .n{font:700 12px/1.2 var(--font)}
  .h{font:500 10.5px/1.3 var(--font);opacity:0.75}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--bg)"><span class="n">App bg</span><span class="h">#FDFCFA</span></div>
    <div class="sw" style="background:var(--bg-warm)"><span class="n">Warm bg</span><span class="h">#FEF6F0</span></div>
    <div class="sw" style="background:var(--card)"><span class="n">Card</span><span class="h">#FFFFFF</span></div>
    <div class="sw" style="background:var(--faint)"><span class="n">Faint</span><span class="h">#F1EDE6</span></div>
    <div class="sw" style="background:var(--text)"><span class="n" style="color:#fff">Text</span><span class="h" style="color:#fff">#1A1A1A</span></div>
    <div class="sw" style="background:var(--text-sub)"><span class="n" style="color:#fff">Sub</span><span class="h" style="color:#fff">#999999</span></div>
    <div class="sw" style="background:var(--text-ghost)"><span class="n" style="color:#fff">Ghost</span><span class="h" style="color:#fff">#CCCCCC</span></div>
    <div class="sw" style="background:var(--card);border-color:var(--border)"><span class="n" style="color:var(--text-sub)">Border</span><span class="h" style="color:var(--text-sub)">#ECE9E3</span></div>
  </div>
</body></html>
