<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:24px 30px;color:var(--text)}
  .row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .meta{margin-left:auto;font:500 12px/1 var(--font);color:var(--text-sub)}
  .s{font-size:26px}
</style></head>
<body>
  <div class="row"><span class="s" style="font-weight:300;font-style:italic;color:var(--ember)">slobode.</span><span class="meta">300 Light italic — accent word</span></div>
  <div class="row"><span class="s" style="font-weight:400">Manrope Regular</span><span class="meta">400 — body</span></div>
  <div class="row"><span class="s" style="font-weight:500">Manrope Medium</span><span class="meta">500 — card titles, values</span></div>
  <div class="row"><span class="s" style="font-weight:600">Manrope SemiBold</span><span class="meta">600 — headlines, numbers</span></div>
  <div class="row"><span class="s" style="font-weight:700">Manrope Bold</span><span class="meta">700 — buttons, sections</span></div>
  <div class="row"><span class="s" style="font-weight:800">Manrope ExtraBold</span><span class="meta">800 — hero number only</span></div>
</body></html>
