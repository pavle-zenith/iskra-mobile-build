<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:26px 30px;color:var(--text)}
  .row{display:flex;align-items:baseline;gap:16px;padding:9px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .meta{margin-left:auto;font:500 12px/1 var(--font);color:var(--text-sub);white-space:nowrap}
</style></head>
<body>
  <div class="row"><span style="font:800 44px/1 var(--font);letter-spacing:-2px">146.000</span><span class="meta">Black 800 · big number / share hero</span></div>
  <div class="row"><span style="font:600 36px/1 var(--font);letter-spacing:-0.5px">Izdržao/la si.</span><span class="meta">Semibold 600 · display</span></div>
  <div class="row"><span style="font:600 28px/1.2 var(--font);letter-spacing:-0.02em">Kako da te zovemo?</span><span class="meta">Semibold 600 · question title</span></div>
  <div class="row"><span style="font:600 22px/1.3 var(--font)">Za 3 meseca, ovo te čeka.</span><span class="meta">Semibold 600 · H2</span></div>
</body></html>
