<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .sw{height:74px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-sizing:border-box}
  .n{font:700 11px/1.2 var(--font);color:#fff}
  .h{font:500 9.5px/1.2 var(--font);color:rgba(255,255,255,0.7)}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:#1A1714"><span class="n">Dišem</span><span class="h">#1A1714</span></div>
    <div class="sw" style="background:#2D6FA8"><span class="n">Pijem vodu</span><span class="h">#2D6FA8</span></div>
    <div class="sw" style="background:#1C1B35"><span class="n">Posmatram</span><span class="h">#1C1B35</span></div>
    <div class="sw" style="background:#1A3A20"><span class="n">Šetam</span><span class="h">#1A3A20</span></div>
    <div class="sw" style="background:#2D1F5E"><span class="n">Igram se</span><span class="h">#2D1F5E</span></div>
  </div>
  <div style="font:500 12px/1.4 var(--font);color:var(--text-sub);margin-top:14px;text-align:center">Immersive craving-tool grounds — the only dark surfaces in the app.</div>
</body></html>
