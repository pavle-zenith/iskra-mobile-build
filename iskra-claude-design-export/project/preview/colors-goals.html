<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .dot{width:42px;height:42px;border-radius:50%}
  .n{font:700 11.5px/1.1 var(--font)}
  .h{font:500 10px/1 var(--font);color:var(--text-sub)}
</style></head>
<body>
  <div class="grid">
    <div class="col"><span class="dot" style="background:#D4547E"></span><span class="n">Zdravlje</span><span class="h">#D4547E</span></div>
    <div class="col"><span class="dot" style="background:#4A8AC4"></span><span class="n">Pluća</span><span class="h">#4A8AC4</span></div>
    <div class="col"><span class="dot" style="background:#3A7A3A"></span><span class="n">Ekologija</span><span class="h">#3A7A3A</span></div>
    <div class="col"><span class="dot" style="background:#2E8B80"></span><span class="n">Finansije</span><span class="h">#2E8B80</span></div>
    <div class="col"><span class="dot" style="background:#C4724A"></span><span class="n">Telo</span><span class="h">#C4724A</span></div>
    <div class="col"><span class="dot" style="background:#6B52A8"></span><span class="n">Nikotin</span><span class="h">#6B52A8</span></div>
  </div>
  <div style="font:500 12px/1.4 var(--font);color:var(--text-sub);margin-top:16px;text-align:center">"Moj napredak" goal categories — each owns one hue (icon + progress bar).</div>
</body></html>
