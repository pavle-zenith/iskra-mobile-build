<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:24px 30px;display:flex;align-items:center;gap:26px}
  .col{display:flex;flex-direction:column;align-items:center;gap:9px}
  .cap{font:500 11px/1.3 var(--font);color:var(--text-sub)}
  img{display:block}
</style></head>
<body>
  <div class="col"><img src="../assets/iskra-logo.png" style="width:96px;height:96px;border-radius:22px;box-shadow:var(--shadow-soft)" /><span class="cap">App icon · 1024</span></div>
  <div class="col"><img src="../assets/iskra-logo.png" style="width:60px;height:60px;border-radius:14px" /><span class="cap">60</span></div>
  <div class="col"><img src="../assets/iskra-logo.png" style="width:40px;height:40px;border-radius:10px" /><span class="cap">40</span></div>
  <div class="col"><img src="../assets/iskra-logo.png" style="width:28px;height:28px;border-radius:7px" /><span class="cap">28</span></div>
  <div style="font:500 12.5px/1.5 var(--font);color:var(--text-sub);max-width:200px">White flame-spark on the ember gradient. The spark = "iskra".</div>
</body></html>
