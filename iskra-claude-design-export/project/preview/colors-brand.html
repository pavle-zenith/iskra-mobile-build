<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:26px 30px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
  .sw{border-radius:14px;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid var(--border)}
  .n{font:700 12px/1.2 var(--font)}
  .h{font:500 10.5px/1.3 var(--font);opacity:0.8}
</style></head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--ember-grad)"><span class="n" style="color:#fff">Ember</span><span class="h" style="color:#fff">#E8621A</span></div>
    <div class="sw" style="background:var(--ember-top)"><span class="n" style="color:#fff">Top</span><span class="h" style="color:#fff">#F0701F</span></div>
    <div class="sw" style="background:var(--ember-deep)"><span class="n" style="color:#fff">Deep</span><span class="h" style="color:#fff">#C9530F</span></div>
    <div class="sw" style="background:var(--ember-tint)"><span class="n" style="color:var(--ember-deep)">Tint</span><span class="h" style="color:var(--ember-deep)">#FEF0E8</span></div>
    <div class="sw" style="background:var(--ember-soft)"><span class="n" style="color:var(--ember-deep)">Soft</span><span class="h" style="color:var(--ember-deep)">#FBEAE0</span></div>
  </div>
</body></html>
