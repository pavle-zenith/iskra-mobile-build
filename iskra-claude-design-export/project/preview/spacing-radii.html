<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:24px 30px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .b{background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
  .cap{position:absolute;bottom:6px;left:0;right:0;text-align:center;font:600 10px/1 var(--font);color:var(--text-sub)}
  .w{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px}
  .lab{font:600 11px/1 var(--font);color:var(--text-sub)}
</style></head>
<body>
  <div class="w"><div class="b" style="width:64px;height:64px;border-radius:12px"></div><span class="lab">12 · input</span></div>
  <div class="w"><div class="b" style="width:64px;height:64px;border-radius:14px"></div><span class="lab">14 · chip</span></div>
  <div class="w"><div class="b" style="width:64px;height:64px;border-radius:16px"></div><span class="lab">16 · button</span></div>
  <div class="w"><div class="b" style="width:64px;height:64px;border-radius:18px"></div><span class="lab">18 · card</span></div>
  <div class="w"><div class="b" style="width:64px;height:64px;border-radius:20px"></div><span class="lab">20 · feature</span></div>
  <div class="w"><div class="b" style="width:64px;height:64px;border-radius:26px"></div><span class="lab">26 · hero</span></div>
  <div class="w"><div class="b" style="width:64px;height:36px;border-radius:999px"></div><span class="lab">999 · pill</span></div>
</body></html>
