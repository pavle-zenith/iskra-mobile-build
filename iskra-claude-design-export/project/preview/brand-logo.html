<!DOCTYPE html><html lang="sr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0}
  body{background:var(--bg);font-family:var(--font);padding:24px 30px;display:flex;align-items:center;gap:36px}
  .lockup{display:flex;align-items:center;gap:13px}
  .mark{width:54px;height:54px;border-radius:14px;background:var(--ember-tint);display:flex;align-items:center;justify-content:center}
  .word{font:700 30px/1 var(--font);letter-spacing:0.16em;color:var(--text)}
  .alt{width:54px;height:54px;border-radius:14px;background:var(--ember-grad);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-ember)}
  .plain{width:54px;height:54px;display:flex;align-items:center;justify-content:center}
  .cap{font:500 11px/1.3 var(--font);color:var(--text-sub);margin-top:8px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
  <div class="lockup">
    <span class="mark"><img src="../assets/iskra-flame-ember.png" alt="Iskra" style="width:34px;height:34px;display:block" /></span>
    <span class="word">ISKRA</span>
  </div>
  <div class="col"><span class="alt"><img src="../assets/iskra-flame-white.png" alt="Iskra" style="width:34px;height:34px;display:block" /></span><span class="cap">app icon</span></div>
  <div class="col"><span class="plain"><img src="../assets/iskra-flame-ember.png" alt="Iskra" style="width:42px;height:42px;display:block" /></span><span class="cap">mark</span></div>
</body></html>
