<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iskra — App Teaser</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<meta name="ext-resource-dependency" content="assets/canyon-bg.png" data-resource-id="canyonBg" />
<meta name="ext-resource-dependency" content="assets/highland-bg.png" data-resource-id="highlandBg" />

    <g transform="translate(600 400)">
      <rect x="-150" y="-250" width="300" height="500" rx="62" fill="#fff" opacity="0.14"/>
      <rect x="-120" y="-220" width="240" height="440" rx="44" fill="#FDFCFA"/>
      <path d="M-18 -150 C -6 -120, -36 -108, -18 -78 C -6 -60, 6 -78, 0 -96 C 18 -72, 30 -54, 12 -30 C 0 -12, -36 -18, -30 -54 C -33 -78, -21 -90, -18 -108 Z" fill="#E8621A" transform="translate(0 -40) scale(1.5)"/>
    </g>
  </svg>
</template>
<style>
  html, body { margin: 0; height: 100%; }
  /* TRANSPARENT by default — drop the recording onto any promo background.
     Toggle a checkerboard (key B / button) only to confirm transparency. */
  body {
    background: transparent;
    overflow: hidden;
    font-family: "Manrope", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  body.checker {
    background-color: #cfcfd4;
    background-image:
      linear-gradient(45deg, #aeaeb4 25%, transparent 25%),
      linear-gradient(-45deg, #aeaeb4 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #aeaeb4 75%),
      linear-gradient(-45deg, transparent 75%, #aeaeb4 75%);
    background-size: 28px 28px;
    background-position: 0 0, 0 14px, 14px -14px, -14px 0;
  }
  body.dark { background: #14110e; }

  #stage { transform-origin: center center; }

  /* angle wrapper holds the static perspective; float wrapper holds the loop */
  #angle { transform-origin: center center; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
  #float { animation: floatBob 6.6s ease-in-out infinite; transform-style: preserve-3d; }

  @keyframes floatBob {
    0%, 100% { transform: translateY(-9px) rotateZ(-0.3deg); }
    50%      { transform: translateY(9px) rotateZ(0.3deg); }
  }

  /* contact shadow under the phone */
  #shadow {
    position: absolute; left: 50%; bottom: -54px; width: 320px; height: 60px;
    transform: translateX(-50%); border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(40,24,10,0.34) 0%, rgba(40,24,10,0.16) 45%, rgba(40,24,10,0) 72%);
    filter: blur(7px); z-index: 0; animation: shadowBreathe 6.6s ease-in-out infinite;
  }
  @keyframes shadowBreathe {
    0%, 100% { transform: translateX(-50%) scale(0.92); opacity: 0.8; }
    50%      { transform: translateX(-50%) scale(1.04); opacity: 1; }
  }

  /* ── titanium frame ── */
  #phone {
    position: relative; z-index: 1;
    padding: 12px; border-radius: 74px;
    background:
      linear-gradient(135deg,
        #e6e6ea 0%, #f6f6f8 9%, #b4b4ba 24%, #8c8c92 38%,
        #d7d7dc 50%, #f4f4f6 63%, #a4a4aa 78%, #cdcdd2 90%, #e9e9ed 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.7) inset,
      0 0 0 1px rgba(120,120,128,0.55),
      0 0 0 2px rgba(255,255,255,0.25),
      0 26px 60px rgba(30,18,8,0.30);
  }
  /* brushed sheen on the rail */
  #phone::before {
    content: ""; position: absolute; inset: 0; border-radius: 74px; pointer-events: none;
    background:
      linear-gradient(115deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 18%,
        rgba(255,255,255,0) 80%, rgba(255,255,255,0.4) 100%);
    mix-blend-mode: screen;
  }
  #bezel {
    position: relative; padding: 7px; border-radius: 64px;
    background: #07070a;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.6), inset 0 0 6px rgba(0,0,0,0.9);
  }
  #screen {
    position: relative; width: 402px; height: 874px; border-radius: 56px;
    overflow: hidden; background: #FDFCFA;
    box-shadow: inset 0 0 0 1.5px rgba(0,0,0,0.55);
  }
  #screen-content { position: absolute; inset: 0; }

  /* status bar overlay (dark glyphs on the light home) */
  .statusbar {
    position: absolute; top: 0; left: 0; right: 0; height: 54px; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 34px; pointer-events: none;
    font-family: -apple-system, "SF Pro", "Manrope", system-ui;
  }
  .statusbar .time { font-size: 16px; font-weight: 700; color: #1A1A1A; letter-spacing: 0.2px; margin-top: 12px; }
  .statusbar .ic { display: flex; align-items: center; gap: 7px; margin-top: 12px; }
  .island {
    position: absolute; top: 13px; left: 50%; transform: translateX(-50%);
    width: 122px; height: 35px; border-radius: 22px; background: #000; z-index: 40;
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.06);
  }

  /* glass sheen + moving glare, clipped to the screen */
  .glass-sheen {
    position: absolute; inset: 0; z-index: 35; pointer-events: none; border-radius: 56px;
    background:
      radial-gradient(120% 60% at 18% 6%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 42%),
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 14%);
  }
  .glass-glare {
    position: absolute; top: -30%; left: -60%; width: 55%; height: 160%;
    z-index: 36; pointer-events: none;
    background: linear-gradient(105deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.32) 50%, rgba(255,255,255,0) 100%);
    transform: rotate(8deg); filter: blur(3px);
    animation: glareSweep 8.5s ease-in-out infinite;
  }
  @keyframes glareSweep {
    0%   { left: -65%; opacity: 0; }
    12%  { opacity: 1; }
    42%  { left: 130%; opacity: 0; }
    100% { left: 130%; opacity: 0; }
  }

  /* side buttons */
  .btn-side { position: absolute; background:
      linear-gradient(180deg, #cwd 0%, #b0b0b6 100%); z-index: 0; }
  .btn-l { left: -3px; border-radius: 3px 0 0 3px;
    background: linear-gradient(90deg, #9a9aa0, #cccdd2); box-shadow: -1px 0 2px rgba(0,0,0,0.25); }
  .btn-r { right: -3px; border-radius: 0 3px 3px 0;
    background: linear-gradient(270deg, #9a9aa0, #cccdd2); box-shadow: 1px 0 2px rgba(0,0,0,0.25); }
  .action { width: 4px; height: 30px; top: 168px; }
  .vol-up { width: 4px; height: 58px; top: 232px; }
  .vol-dn { width: 4px; height: 58px; top: 304px; }
  .power  { width: 4px; height: 92px; top: 246px; }

  /* control panel */
  #ui {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px; z-index: 100;
    background: rgba(20,16,12,0.72); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 6px;
    font-family: "Manrope", system-ui; transition: opacity 0.25s ease;
  }
  #ui.hidden { opacity: 0; pointer-events: none; }
  #ui button {
    border: none; background: transparent; color: rgba(255,255,255,0.7);
    font-family: inherit; font-size: 12.5px; font-weight: 600; padding: 7px 12px;
    border-radius: 9px; cursor: pointer; white-space: nowrap;
  }
  #ui button.on { background: #E8621A; color: #fff; }
  #ui .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.15); }
  #hint {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.45); font: 500 11px/1 "Manrope", system-ui;
    z-index: 100; pointer-events: none; transition: opacity 0.25s ease;
  }
  body:not(.checker):not(.dark) #hint { color: rgba(80,60,40,0.5); }
</style>
</head>
<body>
  <div id="stage">
    <div id="angle">
      <div id="float">
        <div id="shadow"></div>
        <div id="phone">
          <span class="btn-side btn-l action"></span>
          <span class="btn-side btn-l vol-up"></span>
          <span class="btn-side btn-l vol-dn"></span>
          <span class="btn-side btn-r power"></span>
          <div id="bezel">
            <div id="screen">
              <div id="screen-content"><div id="root"></div></div>
              <div class="island"></div>
              <div class="statusbar">
                <span class="time">9:41</span>
                <span class="ic">
                  <svg width="18" height="11" viewBox="0 0 18 11"><rect x="0" y="7" width="3" height="4" rx="0.6" fill="#1A1A1A"/><rect x="4.5" y="5" width="3" height="6" rx="0.6" fill="#1A1A1A"/><rect x="9" y="2.5" width="3" height="8.5" rx="0.6" fill="#1A1A1A"/><rect x="13.5" y="0" width="3" height="11" rx="0.6" fill="#1A1A1A"/></svg>
                  <svg width="16" height="11" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="#1A1A1A"/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="#1A1A1A"/><circle cx="8.5" cy="10.5" r="1.5" fill="#1A1A1A"/></svg>
                  <svg width="25" height="12" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.4" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="#1A1A1A"/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="#1A1A1A" fill-opacity="0.4"/></svg>
                </span>
              </div>
              <div class="glass-sheen"></div>
              <div class="glass-glare"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="hint">press H to hide controls · B for backdrop</div>
  <div id="ui">
    <button id="bg">Backdrop</button>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="screens/HomeScreenTeaser.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<HomeScreenTeaser />);

    // ── fit the phone to the viewport ──
    function fit() {
      const W = 460, H = 980, m = 40;
      const s = Math.min((window.innerWidth - m) / W, (window.innerHeight - m) / H, 1.1);
      document.getElementById('stage').style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit); fit();

    // ── straight, fixed perspective ──
    document.getElementById('angle').style.transform = 'perspective(2000px)';
    const params = new URLSearchParams(location.search);
    if (params.get('clean') === '1') { document.body.classList.remove('checker'); document.getElementById('ui').classList.add('hidden'); document.getElementById('hint').style.opacity = 0; }

    // ── backdrop toggle (transparent ⇄ checker ⇄ dark) ──
    const bgStates = ['', 'checker', 'dark'];
    let bgi = 0;
    function cycleBg() {
      bgi = (bgi + 1) % bgStates.length;
      document.body.classList.remove('checker', 'dark');
      if (bgStates[bgi]) document.body.classList.add(bgStates[bgi]);
    }
    document.getElementById('bg').addEventListener('click', cycleBg);

    // ── keys ──
    document.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'h') { document.getElementById('ui').classList.toggle('hidden'); document.getElementById('hint').style.opacity = document.getElementById('ui').classList.contains('hidden') ? 0 : ''; }
      if (k === 'b') cycleBg();
    });

    // ── gentle auto-scroll of the screen content (the "alive" loop) ──
    function startAutoScroll() {
      const root = document.getElementById('screen-content');
      const scroller = [...root.querySelectorAll('div')].find(d =>
        d.scrollHeight > d.clientHeight + 30 && /auto|scroll/.test(getComputedStyle(d).overflowY));
      if (!scroller) { setTimeout(startAutoScroll, 400); return; }
      const max = Math.min(scroller.scrollHeight - scroller.clientHeight, 240);
      const period = 24000; // ms for a full down-and-back cycle
      const start = performance.now();
      function tick(now) {
        const t = ((now - start) % period) / period;       // 0..1
        const ease = (1 - Math.cos(t * 2 * Math.PI)) / 2;    // 0→1→0 smooth
        scroller.scrollTop = ease * max * 0.7;
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
    setTimeout(startAutoScroll, 700);
  </script>
</body>
</html>
